<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg:#0b0f14; --surface:#131920; --surface2:#1a2332;
  --border:#243044; --accent:#00d4ff; --accent-dim:rgba(0,212,255,0.12);
  --text:#e2eaf6; --dim:#6b7d99; --green:#4ade80; --orange:#fb923c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
.logo{background:linear-gradient(135deg,#00d4ff,#0077b6);color:#000;font-weight:700;font-size:16px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.header-title{font-size:15px;font-weight:500;}
.header-sub{font-size:11px;color:var(--dim);margin-top:1px;}
.header-stats{margin-left:auto;display:flex;gap:20px;align-items:center;}
.hstat{text-align:center;font-family:'JetBrains Mono',monospace;}
.hstat-val{font-size:18px;font-weight:600;color:var(--accent);}
.hstat-lbl{font-size:10px;color:var(--dim);}
.body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.search-area{padding:16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.search-wrap{position:relative;}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 40px 10px 14px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,0.08);}
.search-input::placeholder{color:var(--dim);}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:16px;pointer-events:none;}
.filter-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 8px;color:var(--text);font-size:12px;font-family:'Noto Sans TC',sans-serif;outline:none;cursor:pointer;}
.table-list{flex:1;overflow-y:auto;padding:8px;}
.table-item{padding:11px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;margin-bottom:4px;transition:all 0.15s;}
.table-item:hover{background:var(--surface2);border-color:var(--border);}
.table-item.active{background:var(--accent-dim);border-color:rgba(0,212,255,0.3);}
.ti-no{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--accent-dim);padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:3px;}
.ti-name{font-size:13px;font-weight:500;line-height:1.3;}
.ti-meta{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.result-summary{padding:6px 16px 2px;font-size:11px;color:var(--dim);}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.detail-header{padding:20px 28px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.dh-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:12px;}
.dh-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--surface2),#1f3050);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.dh-name-jp{font-size:11px;color:var(--dim);margin-bottom:2px;}
.dh-name-zh{font-size:20px;font-weight:600;}
.dh-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'JetBrains Mono',monospace;border:1px solid var(--border);color:var(--dim);}
.tag.accent{border-color:rgba(0,212,255,0.4);color:var(--accent);}
.tag.green{border-color:rgba(74,222,128,0.4);color:var(--green);}
.stats-row{display:flex;gap:24px;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.stat{display:flex;align-items:baseline;gap:6px;}
.stat-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);}
.stat-lbl{font-size:11px;color:var(--dim);}
.table-area{flex:1;overflow:auto;padding:20px 28px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--surface2);padding:10px 14px;text-align:left;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10;}
tbody td{padding:9px 14px;border-bottom:1px solid rgba(36,48,68,0.6);font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap;}
tbody tr:hover td{background:rgba(255,255,255,0.02);}
.notes{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:8px;padding:14px 18px;}
.notes-title{font-size:11px;color:var(--orange);font-weight:600;margin-bottom:8px;}
.notes p{font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:4px;}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.toolbar-info{font-size:12px;color:var(--dim);margin-right:auto;}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;border:1px solid var(--border);background:transparent;color:var(--text);}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.overview{flex:1;overflow-y:auto;padding:28px;}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:20px;}
.overview-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.15s;}
.overview-card:hover{border-color:rgba(0,212,255,0.4);background:var(--surface2);transform:translateY(-1px);}
.oc-no{font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
.oc-name{font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.4;}
.oc-meta{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
.overview-title{font-size:18px;font-weight:600;margin-bottom:4px;}
.overview-sub{font-size:13px;color:var(--dim);}
.search-highlight{background:rgba(251,191,36,0.3);border-radius:2px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
/* IMAGES */
.img-section{margin-top:24px;border-top:1px solid var(--border);padding-top:20px;}
.img-title{font-size:13px;color:var(--dim);margin-bottom:12px;font-weight:500;}
.img-grid{display:flex;gap:12px;flex-wrap:wrap;}
.img-wrap{cursor:zoom-in;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface2);transition:border-color 0.15s;width:260px;}
.img-wrap:hover{border-color:var(--accent);}
.img-wrap img{width:100%;display:block;height:180px;object-fit:cover;object-position:top;}
.img-label{font-size:11px;color:var(--dim);text-align:center;padding:5px;font-family:'JetBrains Mono',monospace;}
/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;align-items:center;justify-content:center;}
.lb-inner{position:relative;display:flex;align-items:center;justify-content:center;}
.lb-inner img{max-width:88vw;max-height:88vh;border-radius:8px;box-shadow:0 0 60px rgba(0,0,0,0.8);}
.lb-close{position:absolute;top:-48px;right:0;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;width:36px;height:36px;cursor:pointer;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.6);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:30px;width:48px;height:64px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-prev{left:-64px;}.lb-next{right:-64px;}
.lb-nav:hover{background:rgba(0,212,255,0.2);border-color:var(--accent);}
.lb-counter{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace;}

/* RWD - 手機 */
.menu-btn{display:none;background:transparent;border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;align-items:center;justify-content:center;}
.sidebar-overlay{display:none;}
@media (max-width:768px){
  body{height:100vh;}
  .menu-btn{display:flex;}
  .header{padding:0 12px;gap:10px;height:52px;}
  .logo{width:32px;height:32px;font-size:14px;}
  .header-title{font-size:13px;}
  .header-sub{font-size:10px;}
  .header-stats{gap:12px;}
  .hstat-val{font-size:14px;}
  .hstat-lbl{font-size:9px;}
  .sidebar{position:fixed;top:52px;left:0;height:calc(100vh - 52px);width:86vw;max-width:340px;transform:translateX(-101%);transition:transform 0.25s;z-index:100;box-shadow:2px 0 16px rgba(0,0,0,0.5);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay{position:fixed;inset:52px 0 0 0;background:rgba(0,0,0,0.55);z-index:99;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .sidebar-overlay.open{display:block;opacity:1;pointer-events:auto;}
  .main{width:100%;}
  .detail-header{padding:14px 16px 10px;}
  .dh-name-zh{font-size:17px;}
  .dh-icon{width:38px;height:38px;font-size:18px;}
  .stats-row{padding:10px 16px;gap:14px;}
  .stat-val{font-size:16px;}
  .toolbar{padding:8px 16px;}
  .table-area{padding:12px 16px;}
  .overview{padding:18px;}
  .overview-title{font-size:16px;}
  .overview-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .overview-card{padding:12px;}
  .oc-name{font-size:13px;}
  table{font-size:12px;}
  thead th{padding:7px 10px;font-size:10px;}
  tbody td{padding:6px 10px;font-size:11px;}
  .img-grid{gap:8px;flex-direction:column;}
  .img-wrap{width:100%;}
  .img-wrap img{height:auto;max-height:240px;}
  .lb-prev{left:0;}.lb-next{right:0;}
  .lb-close{top:-44px;}
  .notes{padding:12px 14px;}
  .notes p{font-size:11.5px;}
}

// 手機 sidebar 抽屜開關
function toggleSidebar(open) {
  const sb = document.querySelector('.sidebar');
  const ov = document.querySelector('.sidebar-overlay');
  if(open === undefined) open = !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  ov.classList.toggle('open', open);
}

// 初始化管徑選單 + 規格名稱選單
function init() {
  const dns = [...new Set(DB.flatMap(t=>t.rows.map(r=>r.D)).filter(Boolean))].sort((a,b)=>Number(a)-Number(b));
  const sel = document.getElementById('filter-dn');
  dns.forEach(d=>{ const o=document.createElement('option'); o.value=d; o.textContent='DN'+d; sel.appendChild(o); });

  const nameSel = document.getElementById('search-input');
  DB.forEach(t=>{ const o=document.createElement('option'); o.value=t.name_zh; o.textContent=t.name_zh; nameSel.appendChild(o); });

  renderTableList(DB);
  renderOverview();
}

// 概覽
function renderOverview() {
  document.getElementById('overview-grid').innerHTML = DB.map(t=>`
    <div class="overview-card" onclick="selectTable('${t.id}')">
      <div class="oc-no">${t.table_no}</div>
      <div class="oc-name">${t.name_zh}</div>
      <div class="oc-meta">${t.rows.length} 筆 · ${t.unit}</div>
    </div>`).join('');
}

// 左側列表
function renderTableList(tables) {
  const list = document.getElementById('table-list');
  if(!tables.length) {
    list.innerHTML='<div style="text-align:center;padding:32px 16px;color:var(--dim);font-size:13px;">找不到符合的資料</div>';
    return;
  }
  list.innerHTML = tables.map(t=>`
    <div class="table-item ${currentId===t.id?'active':''}" onclick="selectTable('${t.id}')">
      <div class="ti-no">${t.table_no}</div>
      <div class="ti-name">${t.name_zh}</div>
      <div class="ti-meta">${t.rows.length}筆 · ${t.unit}</div>
    </div>`).join('');
}

// 搜尋 — 文字搜尋和管徑篩選完全獨立處理
function doSearch() {
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  filterDn = document.getElementById('filter-dn').value;

  const matched = DB.filter(t => {
    // 取得這個表格中符合條件的rows
    const rows = getFilteredRows(t);
    // 名稱符合 OR 有符合的rows，就顯示
    const nameOk = !searchQuery ||
      t.name_zh.toLowerCase().includes(searchQuery) ||
      t.name_jp.toLowerCase().includes(searchQuery) ||
      t.table_no.toLowerCase().includes(searchQuery);
    return nameOk || rows.length > 0;
  });

  const totalRows = matched.reduce((s,t)=>s+getFilteredRows(t).length, 0);
  document.getElementById('result-summary').textContent =
    (searchQuery||filterDn) ? `找到 ${matched.length} 個表格，${totalRows} 筆資料` : '';

  renderTableList(matched);

  if(currentId && !matched.find(t=>t.id===currentId)) {
    currentId = null;
    showOverviewPanel();
  } else if(currentId) {
    showTable(currentId);
  }
}

// 取得篩選後的rows（核心邏輯）
function getFilteredRows(t) {
  let rows = t.rows;
  // 管徑篩選
  if(filterDn) rows = rows.filter(r => String(r.D) === filterDn);
  // 文字搜尋：若名稱已符合，顯示全部（符合管徑的）rows；名稱不符才逐row篩選
  if(searchQuery) {
    const nameOk = t.name_zh.toLowerCase().includes(searchQuery) ||
                   t.name_jp.toLowerCase().includes(searchQuery) ||
                   t.table_no.toLowerCase().includes(searchQuery);
    if(!nameOk) rows = rows.filter(r=>JSON.stringify(r).toLowerCase().includes(searchQuery));
  }
  return rows;
}

function selectTable(id) {
  currentId = id;
  if(window.innerWidth <= 768) toggleSidebar(false);
  renderTableList(document.getElementById('table-list').querySelectorAll('.table-item').length
    ? DB.filter(t=>{
        const rows = getFilteredRows(t);
        const nameOk = !searchQuery||t.name_zh.toLowerCase().includes(searchQuery)||t.name_jp.toLowerCase().includes(searchQuery)||t.table_no.toLowerCase().includes(searchQuery);
        return nameOk||rows.length>0;
      })
    : DB);
  doSearch();
  showTable(id);
}

function showOverviewPanel() {
  document.getElementById('main').innerHTML = `
    <div class="overview" id="overview-panel">
      <div class="overview-title">📋 JDPA G 3004 K形延性鑄鐵管</div>
      <div class="overview-sub">全冊 0001–0037 | 共 22 個規格表，559 筆資料</div>
      <div class="overview-grid" id="overview-grid"></div>
    </div>`;
  renderOverview();
}

function showTable(id) {
  const t = DB.find(x=>x.id===id);
  if(!t) return;

  const rows = getFilteredRows(t);
  const cols = t.columns;
  const dns = [...new Set(rows.map(r=>r.D).filter(Boolean))];
  const minDn = dns.length ? Math.min(...dns.map(Number)) : '-';
  const maxDn = dns.length ? Math.max(...dns.map(Number)) : '-';

  function hl(val) {
    if(val===null||val===undefined) return '—';
    const s = String(val);
    if(!searchQuery) return s;
    return s.replace(new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
      '<mark class="search-highlight">$1</mark>');
  }

  // 圖片區
  const imgs = IMGS[id] || [];
  const imgHtml = imgs.length ? `
    <div class="img-section">
      <div class="img-title">📄 原始規格表圖面（點選放大）</div>
      <div class="img-grid">
        ${imgs.map((src,i)=>`
          <div class="img-wrap" onclick="openLightbox('${id}',${i})">
            <img src="${src}" alt="規格圖${i+1}" loading="lazy">
            <div class="img-label">第 ${i+1} 頁</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  document.getElementById('main').innerHTML = `
    <div class="detail-header">
      <div class="dh-top">
        <div class="dh-icon">🔧</div>
        <div style="flex:1">
          <div class="dh-name-zh">${t.name_zh}</div>
        </div>
      </div>
      <div class="dh-tags">
        <span class="tag accent">JDPA G 3004</span>
        <span class="tag accent">${t.table_no}</span>
        <span class="tag green">${t.unit}</span>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><span class="stat-val">${rows.length}</span><span class="stat-lbl">筆資料</span></div>
      ${dns.length>1?`<div class="stat"><span class="stat-val">DN${minDn}</span><span class="stat-lbl">最小</span></div><div class="stat"><span class="stat-val">DN${maxDn}</span><span class="stat-lbl">最大</span></div>`:''}
    </div>
    <div class="toolbar">
      <span class="toolbar-info">${searchQuery||filterDn?`篩選後 ${rows.length} 筆`:'全部資料'}</span>
    </div>
    <div class="table-area">
      <table>
        <thead><tr>${cols.map(c=>`<th>${HEADER_MAP[c]||c}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${hl(r[c])}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
      ${t.notes&&t.notes.length?`<div class="notes"><div class="notes-title">📝 注記</div>${t.notes.map(n=>`<p>${n}</p>`).join('')}</div>`:''}
      ${imgHtml}
    </div>`;
}


// 燈箱
function openLightbox(id, idx) {
  lbTableId=id; lbIdx=idx; updateLightbox();
  document.getElementById('lightbox').style.display='flex';
}
function closeLightbox() { document.getElementById('lightbox').style.display='none'; }
function lbNav(dir) { const imgs=IMGS[lbTableId]; lbIdx=(lbIdx+dir+imgs.length)%imgs.length; updateLightbox(); }
function updateLightbox() {
  const imgs=IMGS[lbTableId];
  document.getElementById('lb-img').src=imgs[lbIdx];
  document.getElementById('lb-counter').textContent=`${lbIdx+1} / ${imgs.length}`;
  document.getElementById('lb-prev').style.display=imgs.length>1?'flex':'none';
  document.getElementById('lb-next').style.display=imgs.length>1?'flex':'none';
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').style.display==='none') return;
  if(e.key==='Escape') closeLightbox();
  if(e.key==='ArrowLeft') lbNav(-1);
  if(e.key==='ArrowRight') lbNav(1);
});

init();
</script>
</body>
</html>
